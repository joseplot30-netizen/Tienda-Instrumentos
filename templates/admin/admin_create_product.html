{% extends 'layout.html' %}

{% block title %}Crear Producto{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/style_admin.css') }}">
<style>
    .form-grid {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 1.5rem;
        align-items: start;
    }

    .form-grid .form-label,
    .form-grid label {
        font-weight: 600;
        color: #fff;
        padding-top: 0.375rem;
    }

    .form-grid .form-control,
    .form-grid .form-select {
        width: 100%;
    }

    .form-group-double {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 1.5rem;
        align-items: start;
    }

    .form-group-buttons {
        grid-column: 1 / -1;
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1rem;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .form-group-double {
            grid-column: 1 / -1;
            grid-template-columns: 1fr;
        }

        .form-group-buttons {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>➕ Crear Producto</h1>

    <form method="post" style="background-color: rgba(0, 0, 0, 0.5); padding: 2rem; border-radius: 12px;">
        <div class="form-grid">
            <!-- Nombre -->
            <label class="form-label">Nombre</label>
            <input class="form-control" name="name" placeholder="Nombre del producto" required>

            <!-- Imagen (con dos opciones) -->
            <label class="form-label">Imagen</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-items: center;">
                <input class="form-control" name="image" type="file" accept="image/*" placeholder="Seleccionar archivo">
                <span style="text-align: center; color: #999;">o</span>
                <input type="url" name="image_url" placeholder="URL de la imagen" class="form-control" style="grid-column: 1 / -1;">
            </div>

            <!-- Descripción -->
            <label class="form-label">Descripción</label>
            <textarea class="form-control" name="description" placeholder="Breve descripción" style="resize: vertical; min-height: 80px;"></textarea>

            <!-- Precio -->
            <label class="form-label">Precio</label>
            <input class="form-control" name="price" type="number" step="0.01" placeholder="0.00" required>

            <!-- Stock -->
            <label class="form-label">Stock</label>
            <input class="form-control" name="stock" type="number" min="0" value="0" required>

            <!-- Categoría -->
            <label class="form-label">Categoría</label>
            <select class="form-select" name="category" required>
                <option value="">Seleccionar...</option>
                <option value="bajos">Bajos</option>
                <option value="guitarras">Guitarras</option>
                <option value="baterias">Baterías</option>
                <option value="otros">Otros</option>
            </select>

            <!-- Marca -->
            <label class="form-label">Marca</label>
            <input class="form-control" name="brand" placeholder="yamaha, ibanez, etc. (opcional)">

            <!-- Botones de acción -->
            <div class="form-group-buttons">
                <button class="btn btn-primary" type="submit">✓ Crear Producto</button>
                <a class="btn btn-secondary" href="{{ url_for('admin_products') }}">✕ Cancelar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
