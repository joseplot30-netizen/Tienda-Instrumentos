{% extends 'layout.html' %}

{% block title %}Crear Usuario{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/style_admin.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>➕ Crear Usuario</h1>
    
    <form method="post" style="background-color: rgba(0, 0, 0, 0.5); padding: 2rem; border-radius: 12px;">
        <div class="mb-3">
            <label class="form-label">👤 Usuario</label>
            <input class="form-control" name="username" placeholder="Nombre de usuario" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">📧 Email</label>
            <input class="form-control" name="email" type="email" placeholder="usuario@ejemplo.com" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">🔐 Contraseña</label>
            <input class="form-control" name="password" type="password" placeholder="Contraseña" required>
        </div>
        
        <div class="mb-3">
            <label class="form-check-label">
                <input class="form-check-input" type="checkbox" name="is_admin">
                ⚙️ Administrador
            </label>
        </div>
        
        <div style="text-align: center; gap: 1rem;">
            <button class="btn btn-primary" type="submit">✓ Crear Usuario</button>
            <a class="btn btn-secondary" href="{{ url_for('admin_users') }}">✕ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
