{% extends 'layout.html' %}

{% block title %}Editar Producto{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/style_admin.css') }}">
<style>
    .form-grid {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 1.5rem;
        align-items: start;
    }

    .form-grid .form-label,
    .form-grid label {
        font-weight: 600;
        color: #fff;
        padding-top: 0.375rem;
    }

    .form-grid .form-control,
    .form-grid .form-select,
    .form-grid textarea {
        width: 100%;
    }

    .form-group-buttons {
        grid-column: 1 / -1;
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1rem;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .form-group-buttons {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>✏️ Editar Producto: {{ product.name }}</h1>
    
    <form method="post" style="background-color: rgba(0, 0, 0, 0.5); padding: 2rem; border-radius: 12px;">
        <div class="form-grid">
            <!-- Nombre -->
            <label class="form-label">Nombre</label>
            <input class="form-control" name="name" value="{{ product.name }}" required>
            
            <!-- Descripción -->
            <label class="form-label">Descripción</label>
            <textarea class="form-control" name="description" style="resize: vertical; min-height: 80px;">{{ product.description }}</textarea>
            
            <!-- Precio -->
            <label class="form-label">Precio</label>
            <input class="form-control" name="price" type="number" step="0.01" value="{{ product.price }}" required>
            
            <!-- Stock -->
            <label class="form-label">Stock</label>
            <input class="form-control" name="stock" type="number" min="0" value="{{ product.stock }}" required>
            
            <!-- Botones de acción -->
            <div class="form-group-buttons">
                <button class="btn btn-primary" type="submit">💾 Guardar Cambios</button>
                <a class="btn btn-secondary" href="{{ url_for('admin_products') }}">✕ Cancelar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
