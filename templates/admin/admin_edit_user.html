{% extends 'layout.html' %}

{% block title %}Editar Usuario{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/style_admin.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>✏️ Editar Usuario: {{ user.username }}</h1>
    
    <form method="post" style="background-color: rgba(0, 0, 0, 0.5); padding: 2rem; border-radius: 12px;">
        <div class="mb-3">
            <label class="form-label">👤 Usuario</label>
            <input class="form-control" name="username" value="{{ user.username }}" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">📧 Email</label>
            <input class="form-control" name="email" type="email" value="{{ user.email }}" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">🔐 Contraseña (dejar vacío para no cambiar)</label>
            <input class="form-control" name="password" type="password" placeholder="Nueva contraseña (opcional)">
        </div>
        
        <div class="mb-3">
            <label class="form-check-label">
                <input class="form-check-input" type="checkbox" name="is_admin" {% if user.is_admin %}checked{% endif %}>
                ⚙️ Administrador
            </label>
        </div>
        
        <div style="text-align: center; gap: 1rem;">
            <button class="btn btn-primary" type="submit">💾 Guardar Cambios</button>
            <a class="btn btn-secondary" href="{{ url_for('admin_users') }}">✕ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
