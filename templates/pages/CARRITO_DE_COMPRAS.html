{% extends "layout.html" %}

{% block head %}
    <title>Carrito</title>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js" defer></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
        integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
    <link rel="shortcut icon" href="" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/carrito.css') }}?v=2">
    <link rel="preconnect" href="https://unpkg.com">
{% endblock %}

{% block content %}
        <main>
            <div class="contenedor-carrito">
                <p id="carrito-vacio" class="carrito-vacio">Tu carrito está vacío. <i class="bi bi-emoji-frown"></i></p>

                <div id="carrito-productos" class="carrito-productos disabled">
                    <!-- Esto se va a completar con código el JS -->
                </div>

                <div id="acciones" class="acciones">
                    <div id="carrito-acciones" class="carrito-acciones disabled">
                        <div class="carrito-acciones-derecha">
                            <button id="carrito-acciones-vaciar" class="carrito-acciones-vaciar" aria-label="Vaciar el carrito">Vaciar carrito</button>
                            <div class="carrito-acciones-total">
                                <p>Total:</p>
                                <p id="total">$0</p>
                            </div>
                            <button id="carrito-acciones-comprar" onclick="envios()" class="carrito-acciones-comprar" aria-label="Proceder con la compra">Comprar ahora</button>
                        </div>
                    </div>
                </div>

                <p id="carrito-comprado" class="carrito-comprado disabled">Muchas gracias por tu compra. <i class="bi bi-emoji-laughing"></i></p>
            </div>
        </main>

    <script src="{{ url_for('static', filename='js/carrito.js') }}" defer></script>
{% endblock %}
